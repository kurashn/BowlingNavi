name: Daily AI Writer

on:
  schedule:
    # 毎日 07:00 JST -> 22:00 UTC に実行
    - cron: '0 22 * * *'
  workflow_dispatch:
    # 手動実行用

permissions:
  contents: write # 変更したCSVをリポジトリにプッシュするために必要

jobs:
  write-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openai
        
    - name: Run AI Writer Script
      env:
        WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python scripts/github_ai_writer.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add content_pipeline.csv
        # 変更がある場合のみコミット
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update content_pipeline.csv status to Draft via AI Writer" && git push)
